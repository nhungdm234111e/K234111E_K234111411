<div class="container mt-4">

  <h3>🛒 Giỏ Hàng Của Bạn</h3>

  <!-- Thông báo -->
  <div *ngIf="message" class="alert alert-success">{{ message }}</div>

  <!-- Giỏ trống -->
  <div *ngIf="cartItems.length === 0" class="alert alert-info">
    Giỏ hàng trống! <a routerLink="/product-list-63">Mua sắm ngay</a>
  </div>

  <!-- Có sản phẩm trong giỏ -->
  <div *ngIf="cartItems.length > 0">
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Tên Sản Phẩm</th>
          <th>Đơn Giá</th>
          <th>Số Lượng</th>
          <th>Thành Tiền</th>
          <th>Xóa</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems">
          <td>{{ item.ProductName }}</td>
          <td>{{ item.Price | number:'1.0-0' }} VNĐ</td>
          <td>
            <!-- Ô nhập số lượng -->
            <input type="number" [(ngModel)]="item.quantity"
                   min="1" style="width: 70px"
                   class="form-control form-control-sm d-inline" />
          </td>
          <td>{{ item.Price * item.quantity | number:'1.0-0' }} VNĐ</td>
          <td>
            <button class="btn btn-danger btn-sm"
                    (click)="removeItem(item.ProductId)">Xóa</button>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3" class="text-end fw-bold">Tổng cộng:</td>
          <td colspan="2" class="fw-bold text-danger">
            {{ getTotalPrice() | number:'1.0-0' }} VNĐ
          </td>
        </tr>
      </tfoot>
    </table>

    <!-- Các nút hành động -->
    <div class="d-flex gap-2">
      <button class="btn btn-secondary" (click)="continueShopping()">
        ← Tiếp tục mua hàng
      </button>
      <button class="btn btn-success"
              (click)="updateQuantity(item.ProductId, item.quantity)"
              *ngFor="let item of cartItems; let i = index"
              [style.display]="i===0 ? 'block' : 'none'">
        Cập nhật giỏ hàng
      </button>
    </div>
  </div>

</div>
