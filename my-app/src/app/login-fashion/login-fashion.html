<p>login-fashion works!</p>
<div class="login-wrap">

    <div class="login-card">
        <div class="login-logo"></div>
        <h2>{{ isRegisterMode ? 'Đăng ký tài khoản' : 'Đăng nhập' }}</h2>
        <p class="login-sub">Fashion Management System</p>

        <p class="message" *ngIf="message">{{ message }}</p>

        <div class="field">
            <label>Tên đăng nhập</label>
            <input type="text" [(ngModel)]="username" placeholder="Nhập username"/>
        </div>

        <div class="field">
            <label>Mật khẩu</label>
            <input type="password" [(ngModel)]="password" placeholder="Nhập password"/>
        </div>

        <button class="btn-main" (click)="onSubmit()">
            {{ isRegisterMode ? 'Đăng ký' : 'Đăng nhập' }}
        </button>

        <p class="toggle-text">
            {{ isRegisterMode ? 'Đã có tài khoản?' : 'Chưa có tài khoản?' }}
            <a (click)="toggleMode()">
                {{ isRegisterMode ? 'Đăng nhập' : 'Đăng ký ngay' }}
            </a>
        </p>
    </div>

</div>
