<p>books works!</p> 
<a routerLink="../ex-43">New a Book</a>
<p>{{errMessage}} </p>
Book ID: <input type="text" #bookId> 
<button (click)="searchBook(bookId.value)">Search</button>
<table border="1"> 
    <tr> 
        <td>BookId</td> 
        <td>BookName</td> 
        <td>Price</td> 
        <td>Image</td> 
    </tr> 
    <tbody> 
        <tr *ngFor="let book of books"> 
            <td>{{book.BookId}}</td> 
            <td>{{book.BookName}}</td> 
            <td>{{book.Price}} </td> 
            <td> 
                <img src="http://localhost:3000/assets/book_images/{{book.Image}}" width="50px" height="50px" (click)="view_detail(book.BookId)">
            </td> 
        </tr> 
    </tbody> 
</table>
