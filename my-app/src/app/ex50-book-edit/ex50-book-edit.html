<p>ex50-book-edit works!</p>
<div class="container">
  <h2>CHỈNH SỬA THÔNG TIN SÁCH</h2>
  
  <!-- Hiển thị thông báo -->
  <div class="success-message" *ngIf="successMessage">
    <p>{{ successMessage }}</p>
  </div>
  
  <div class="error-message" *ngIf="errMessage">
    <p>{{ errMessage }}</p>
  </div>
  
  <!-- Form chỉnh sửa thông tin sách -->
  <form class="book-form" *ngIf="book.BookId">
    <table class="form-table">
      <tr>
        <td class="label">Book Id:</td>
        <td>
          <input 
            type="text" 
            class="form-control" 
            name="BookId"
            [(ngModel)]="book.BookId"
            readonly
          />
          <small>* Book Id không thể chỉnh sửa</small>
        </td>
      </tr>
      
      <tr>
        <td class="label">Book Name:</td>
        <td>
          <textarea 
            class="form-control" 
            name="BookName"
            placeholder="Nhập tên sách"
            [(ngModel)]="book.BookName"
            rows="4"
            required
          ></textarea>
        </td>
      </tr>
      
      <tr>
        <td class="label">Mô tả:</td>
        <td>
          <textarea 
            class="form-control" 
            name="Mota"
            placeholder="Nhập mô tả chi tiết"
            [(ngModel)]="book.Mota"
            rows="4"
          ></textarea>
        </td>
      </tr>
      
      <tr>
        <td class="label">Price:</td>
        <td>
          <input 
            type="number" 
            class="form-control" 
            name="Price"
            placeholder="Nhập giá sách"
            [(ngModel)]="book.Price"
            required
          />
        </td>
      </tr>
      
      <tr>
        <td class="label">Ảnh bìa:</td>
        <td>
          <input 
            type="text" 
            class="form-control" 
            name="Anhbia"
            placeholder="Nhập tên file ảnh bìa"
            [(ngModel)]="book.Anhbia"
          />
        </td>
      </tr>
      
      <tr>
        <td class="label">Ngày cập nhật:</td>
        <td>
          <input 
            type="text" 
            class="form-control" 
            name="Ngaycapnhat"
            placeholder="dd/mm/yyyy HH:mm:ss SA/CH"
            [(ngModel)]="book.Ngaycapnhat"
          />
        </td>
      </tr>
      
      <tr>
        <td class="label">Số lượng tồn:</td>
        <td>
          <input 
            type="number" 
            class="form-control" 
            name="Soluongton"
            placeholder="Nhập số lượng tồn"
            [(ngModel)]="book.Soluongton"
          />
        </td>
      </tr>
      
      <tr>
        <td class="label">Mã CD:</td>
        <td>
          <input 
            type="number" 
            class="form-control" 
            name="MaCD"
            placeholder="Nhập mã CD"
            [(ngModel)]="book.MaCD"
          />
        </td>
      </tr>
      
      <tr>
        <td class="label">Mã NXB:</td>
        <td>
          <input 
            type="number" 
            class="form-control" 
            name="MaNXB"
            placeholder="Nhập mã nhà xuất bản"
            [(ngModel)]="book.MaNXB"
          />
        </td>
      </tr>
      
      <tr>
        <td class="label">Preview:</td>
        <td>
          <img 
            src="http://localhost:3000/assets/book_images/{{ book.Anhbia }}" 
            width="100" 
            height="100"
            alt="{{ book.BookName }}"
            *ngIf="book.Anhbia"
          />
        </td>
      </tr>
      
      <tr>
        <td colspan="2" class="action-buttons">
          <button type="button" class="btn-submit" (click)="updateBook()">Cập nhật</button>
          <button type="button" class="btn-reset" (click)="resetForm()">Reset</button>
          <button type="button" class="btn-back" (click)="backToList()">Quay lại</button>
        </td>
      </tr>
    </table>
  </form>
</div>
